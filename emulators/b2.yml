#     opus/OPUS-DDOS-3.45.rom     16384  md5:d98316eaff56ceab4fe3bfe54d2f92b2  Opus DDOS
#     opus/challenger-1.01.rom    16384  md5:67e086a11834f8cc69175b601c4e5a5f  Opus Challenger
#
