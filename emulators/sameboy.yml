      md5: "b4331a9e612b4738867a30af9c96df52"
      sha1: "576678d0fc3892b80471d7067ce6014e6af77ed5"
    cgb_boot.bin:
      md5: "6b68be48dab6a7298a8c07e00c136b4e"
      sha1: "9884b972110a63c9e86fb3bd241bd2e39ca82bb9"
    agb_boot.bin:
